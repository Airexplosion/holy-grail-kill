name: Deploy to Server

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH="/www/server/nodejs/v24.12.0/bin:$PATH"
            git config --global --add safe.directory /www/wwwroot/holyGK

            APP_DIR="/www/wwwroot/holyGK"

            # First deploy: clone
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p /www/wwwroot
              git clone https://github.com/Airexplosion/holy-grail-kill.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git clean -fd
            git fetch --all
            git reset --hard origin/main

            # Install & build
            pnpm install --frozen-lockfile || pnpm install
            pnpm run build:shared
            pnpm --filter client run build

            # Start or restart with pm2
            if pm2 describe holy-grail-kill > /dev/null 2>&1; then
              pm2 restart holy-grail-kill
            else
              pm2 start ecosystem.config.cjs --env production
            fi

            pm2 save

            echo "Deploy complete: $(git describe --tags --always)"
