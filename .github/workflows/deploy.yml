name: Deploy to Server

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH="/root/.local/share/pnpm:$PATH"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            APP_DIR="/www/wwwroot/holyGK"

            # First deploy: clone
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p /www/wwwroot
              git clone https://github.com/Airexplosion/holy-grail-kill.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git checkout --force "$GITHUB_REF_NAME" 2>/dev/null || git checkout --force main
            git pull origin main --force

            # Install & build
            pnpm install --frozen-lockfile || pnpm install
            pnpm run build:shared
            pnpm run build

            # Start or restart with pm2
            if pm2 describe holy-grail-kill > /dev/null 2>&1; then
              pm2 restart holy-grail-kill
            else
              pm2 start ecosystem.config.cjs --env production
            fi

            pm2 save

            echo "Deploy complete: $(git describe --tags --always)"
